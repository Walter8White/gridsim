lidar:
  frame_id: grid_lidar
  parent_frame: grid
  model: HESAI_XT32_SD10
  horizontal_fov_deg: 360.0
  vertical_fov_deg: 40.0
  horizontal_resolution_deg: 0.2
  vertical_channels: 32
  min_range_m: 0.3
  max_range_m: 50.0
  range_noise_std_m: 0.01
  latency_ms: 20.0
  extrinsics:
    translation_m: [0.0, 0.85, -0.38]
    rpy_deg: [0.0, 0.0, 0.0]

depth_camera:
  frame_id: depth_camera
  parent_frame: robot_base
  model: depth_camera
  horizontal_fov_deg: 87.0
  vertical_fov_deg: 58.0
  min_range_m: 0.3
  max_range_m: 6.0
  latency_ms: 30.0
  extrinsics:
    translation_m: [0.0, 0.0, -0.38]
    rpy_deg: [0.0, 0.0, 0.0]

llt3000_600:
  enable_ll3000_visual: false
  frame_id: llt3000_600_scanner_frame
  parent_frame: scanner_mount_link
  model: scanCONTROL_LLT3000_600
  scanner_mount_link: scanner_mount_link
  usd_asset_path: assets/cad/sensors/llt3000_600/llt3000_600_visual.usd
  scanner_mount_offset_from_carriage_m: [0.0, 0.15, 0.25]
  sensor_pose_on_mount:
    translation_m: [0.0, 0.0, 0.0]
    rpy_deg: [0.0, 0.0, 0.0]
  scanner_frame_translation_m: [0.0, 0.0, 0.77]
  x_fov_mm: 600
  z_measurement_range_mm: 480
  points_per_profile: 2048
  nominal_profile_rate_hz: 10000
  wavelength_nm: 658
  ip_rating: IP67

gocator2690:
  enable_gocator_visual: true
  frame_id: gocator2690_scanner_frame
  parent_frame: scanner_mount_link
  model: Gocator_2690
  scanner_mount_link: scanner_mount_link
  usd_asset_path: assets/cad/sensors/gocator2690/gocator2690_visual.usd
  scanner_mount_offset_from_carriage_m: [0.0, 0.15, 0.25]
  sensor_pose_on_mount:
    translation_m: [0.0, 0.0, 0.0]
    rpy_deg: [-90.0, 0.0, 180.0]
  scanner_frame_translation_m: [0.0, 0.0, 0.0]
  x_fov_near_mm: 385
  x_fov_far_mm: 2000
  z_measurement_range_mm: 1550
  clearance_distance_mm: 325
  nominal_standoff_mm: 1100

grid_imu:
  frame_id: grid_imu
  parent_frame: grid
  accelerometer_noise_std_mps2: 0.015
  gyroscope_noise_std_radps: 0.001
  accelerometer_bias_std_mps2: 0.02
  gyroscope_bias_std_radps: 0.002
  bias_random_walk: 0.0001
  latency_ms: 5.0
  extrinsics:
    translation_m: [0.0, 0.0, 0.0]
    rpy_deg: [0.0, 0.0, 0.0]

robot_imu:
  frame_id: robot_imu
  parent_frame: robot_base
  accelerometer_noise_std_mps2: 0.02
  gyroscope_noise_std_radps: 0.002
  accelerometer_bias_std_mps2: 0.03
  gyroscope_bias_std_radps: 0.003
  bias_random_walk: 0.0002
  latency_ms: 5.0
  extrinsics:
    translation_m: [0.0, 0.0, 0.12]
    rpy_deg: [0.0, 0.0, 0.0]

motor_encoders:
  counts_per_revolution: 4096
  noise_std_counts: 0.25
  latency_ms: 2.0

linear_rail_encoders:
  resolution_m: 0.0001
  noise_std_m: 0.00005
  latency_ms: 2.0

module_joint_encoders:
  resolution_rad: 0.0002
  noise_std_rad: 0.0001
  latency_ms: 3.0

distance_sensors:
  frame_prefix: grid_distance
  min_range_m: 0.05
  max_range_m: 3.0
  noise_std_m: 0.003
  latency_ms: 10.0
  extrinsics:
    translation_m: [0.0, 0.0, 0.0]
    rpy_deg: [0.0, 0.0, 0.0]

# TF-Luna LiDAR sensors (left / center / right) on robot front face
tf_luna:
  model: Benewake_TF-Luna
  count: 3
  min_range_m: 0.2
  max_range_m: 8.0
  noise_std_m: 0.015
  update_rate_hz: 30
  sensor_spacing_m: 0.15
  placements: [left, center, right]
  frame_ids: [distance_left, distance_center, distance_right]

homing_switches:
  latency_ms: 2.0
  normally_closed: true

module_state_sensors:
  latency_ms: 10.0
  states: [unknown, folded, deploying, locked, fault]
